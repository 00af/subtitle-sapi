name: Build Windows Subtitle EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Add MSVC Build Tools
      uses: microsoft/setup-msbuild@v2

    - name: Compile subtitle.exe
      run: |
        cl subtitle.cpp /EHsc /Fe:subtitle.exe sapi.lib ole32.lib user32.lib gdi32.lib

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: subtitle-exe
        path: subtitle.exe
